<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">Chats</div>
            <div class="search">
                <input type="text" placeholder="Search chats">
            </div>
            <div class="chat-list">
                <div class="chat-item">
                    <div class="chat-name">Alice</div>
                    <div class="chat-preview">See you tomorrow!</div>
                </div>
                <div class="chat-item">
                    <div class="chat-name">Bob</div>
                    <div class="chat-preview">Thanks!</div>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="main-header">Alice</div>
            <div class="messages" id="messages">
                <div class="message received">Hi! How are you?</div>
                <div class="message sent">I'm good. Working on a chat app.</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
